name: Daily GEO Article

on:
  schedule:
    # Beijing 07:20 is UTC 23:20 on the previous day.
    - cron: "20 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GEO article
        run: node scripts/generate-geo-article.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build site
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Commit generated GEO article
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily GEO article"
          file_pattern: src/content/geo/*.mdx

      - name: Trigger R2 deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-r2.yml',
              ref: context.ref.replace('refs/heads/', ''),
            });
